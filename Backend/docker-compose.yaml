services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: hw
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hw"]
      interval: 5s
      timeout: 5s
      retries: 5
  
  postgres_test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: avito-test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d avito-test"]

  redpanda:
    image: redpandadata/redpanda:latest
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - "1G"
      - --reserve-memory
      - "0M"
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
    ports:
      - "9092:9092"

  console:
    image: redpandadata/console:latest
    environment:
      KAFKA_BROKERS: redpanda:29092
    ports:
      - "8080:8080"
    depends_on:
      - redpanda

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8003
    ports:
      - "8003:8003"
    environment:
      DATABASE_DSN: postgresql://postgres:postgres@postgres:5432/hw
      KAFKA_BOOTSTRAP: redpanda:29092
      REDIS_URL: redis://redis:6379/0
      MODERATION_TOPIC: moderation
      DLQ_TOPIC: dlq
      PREDICTION_CACHE_TTL_SECONDS: 900
      SENTRY_DSN: ""
      SENTRY_ENVIRONMENT: development
      SENTRY_TRACES_SAMPLE_RATE: 1.0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      redpanda:
        condition: service_started

  moderation_worker:
    build: .
    command: python -m app.workers.moderation_worker
    environment:
      DATABASE_DSN: postgresql://postgres:postgres@postgres:5432/hw
      KAFKA_BOOTSTRAP: redpanda:29092
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_started

  dlq_worker:
    build: .
    command: python -m app.workers.dlq_worker
    environment:
      DATABASE_DSN: postgresql://postgres:postgres@postgres:5432/hw
      KAFKA_BOOTSTRAP: redpanda:29092
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_started
  
  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]

  sentry-redis:
    image: redis:7-alpine
    restart: always
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]

  sentry-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sentry
      POSTGRES_PASSWORD: sentry
      POSTGRES_DB: sentry
    volumes:
      - sentry-pgdata:/var/lib/postgresql/data

  sentry:
    image: sentry:latest
    ports:
      - "9000:9000"
    environment:
      SENTRY_SECRET_KEY: "verysecretkey123456789012345678901234567890"
      SENTRY_POSTGRES_HOST: sentry-postgres
      SENTRY_POSTGRES_PORT: 5432
      SENTRY_DB_NAME: sentry
      SENTRY_DB_USER: sentry
      SENTRY_DB_PASSWORD: sentry
      SENTRY_REDIS_HOST: sentry-redis
      SENTRY_REDIS_PORT: 6379
      SENTRY_SINGLE_ORGANIZATION: "true"
    depends_on:
      - sentry-postgres
      - sentry-redis
    command: ["sentry", "run", "web"]

  sentry-worker:
    image: sentry:latest
    environment:
      SENTRY_SECRET_KEY: "verysecretkey123456789012345678901234567890"
      SENTRY_POSTGRES_HOST: sentry-postgres
      SENTRY_POSTGRES_PORT: 5432
      SENTRY_DB_NAME: sentry
      SENTRY_DB_USER: sentry
      SENTRY_DB_PASSWORD: sentry
      SENTRY_REDIS_HOST: sentry-redis
      SENTRY_REDIS_PORT: 6379
    depends_on:
      - sentry-postgres
      - sentry-redis
    command: ["sentry", "run", "worker"]

  sentry-cron:
    image: sentry:latest
    environment:
      SENTRY_SECRET_KEY: "verysecretkey123456789012345678901234567890"
      SENTRY_POSTGRES_HOST: sentry-postgres
      SENTRY_POSTGRES_PORT: 5432
      SENTRY_DB_NAME: sentry
      SENTRY_DB_USER: sentry
      SENTRY_DB_PASSWORD: sentry
      SENTRY_REDIS_HOST: sentry-redis
      SENTRY_REDIS_PORT: 6379
    depends_on:
      - sentry-postgres
      - sentry-redis
    command: ["sentry", "run", "cron"]

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  grafana:
    image: grafana/grafana:latest
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus

volumes:
  pgdata:
  sentry-pgdata:
